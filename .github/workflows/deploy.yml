name: Build and Deploy

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Critical E2E
        run: npm run test:e2e:critical

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check VPS_HOST
        id: check_vps_host
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          [ -n "${VPS_HOST}" ] || { echo "Missing VPS_HOST"; exit 1; }

      - name: Check VPS_USER
        id: check_vps_user
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          [ -n "${VPS_USER}" ] || { echo "Missing VPS_USER"; exit 1; }

      - name: Check VPS_SSH_KEY
        id: check_vps_ssh_key
        continue-on-error: true
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          [ -n "${VPS_SSH_KEY}" ] || { echo "Missing VPS_SSH_KEY"; exit 1; }

      - name: Deploy on VPS over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/fn-musobaqa' }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" << EOF
          set -euo pipefail
          cd "${VPS_APP_DIR}"
          git fetch --all
          git reset --hard "origin/${DEPLOY_BRANCH}"
          docker compose -f docker-compose.prod.yml build --pull migrate app
          docker compose -f docker-compose.prod.yml run --rm migrate
          docker compose -f docker-compose.prod.yml up -d postgres app nginx certbot
          EOF
