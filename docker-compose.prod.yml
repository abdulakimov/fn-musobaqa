services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fn-musobaqa-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    container_name: fn-musobaqa-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: fn-musobaqa-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_TEMPLATE: ${NGINX_TEMPLATE:-app-http-only.conf.template}
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/$$NGINX_TEMPLATE > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    volumes:
      - ./deploy/nginx:/etc/nginx/templates:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-web:/var/www/certbot
    networks:
      - app_net

  certbot:
    image: certbot/certbot:latest
    container_name: fn-musobaqa-certbot
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-web:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - app_net

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  certbot-web:

networks:
  app_net:
    driver: bridge
